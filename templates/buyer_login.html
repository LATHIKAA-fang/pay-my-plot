<!DOCTYPE html>
<html>
<head>

<title>Buyer Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.login-box{
    width:350px;
    margin:120px auto;
    padding:25px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.btn{
    width:95%;
    padding:10px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

.btn:hover{
    background:#1a5fd1;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Buyer Login</h2>

<form method="post">

<label>Email</label><br>
<input type="email" name="email" placeholder="Enter your email" required>

<label>Password</label><br>
<input type="password" name="password" placeholder="Enter your password" required>

<input type="submit" value="Login" class="btn">

</form>

</div>

</body>
</html>
